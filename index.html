<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Happy Birthday Annu ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
text-align:center;
overflow:hidden;
}

#start{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:30px;
background:#ff4d6d;
color:white;
cursor:pointer;
}

#main{
display:none;
padding:20px;
}

.slider{
width:90%;
max-width:350px;
margin:auto;
border-radius:20px;
overflow:hidden;
}

.slider img{
width:100%;
display:none;
}

.heart{
position:fixed;
color:red;
bottom:-10px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-1200px)}
}

.message{
max-width:700px;
margin:auto;
line-height:1.7;
font-size:18px;
margin-top:20px;
}

</style>

</head>

<body>

<div id="start">

<h1>For Annu Priya ❤️</h1>

<p>A small surprise from Aarav</p>

<button onclick="start()">Tap To Unlock Memories</button>

</div>

<div id="main">

<h1>Happy 20th Birthday ❤️</h1>

<h2>Annu Priya</h2>

<div class="slider">

<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">
<img src="photo4.jpg">
<img src="photo5.jpg">

</div>

<div class="message" id="text"></div>

</div>

<audio autoplay loop>
<source src="song.mp3" type="audio/mp3">
</audio>

<script>

function start(){

document.getElementById("start").style.display="none"

document.getElementById("main").style.display="block"

slideShow()

typeWriter()

}

let slides=document.querySelectorAll(".slider img")

let index=0

function slideShow(){

slides.forEach(img=>img.style.display="none")

index++

if(index>slides.length){index=1}

slides[index-1].style.display="block"

setTimeout(slideShow,2500)

}

let text=`To the most beautiful soul in my life,

Annu ❤️

Give me your bad days,
give me your good days.

Give me your smiles
and give me your tears.

Tell me your dreams,
and tell me your fears.

I'm not here only
for the sunshine days.

I'm here for the storms too.

I'll hold your hand
when life gets hard.

I'll stand beside you
when the world feels heavy.

You are not just someone I love,
you are someone I choose every single day.

Happy 20th Birthday
my love ❤️

— Aarav`

let i=0

function typeWriter(){

if(i<text.length){

document.getElementById("text").innerHTML+=text.charAt(i)

i++

setTimeout(typeWriter,40)

}

}

function createHeart(){

let heart=document.createElement("div")

heart.className="heart"

heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"vw"

heart.style.fontSize=Math.random()*25+10+"px"

document.body.appendChild(heart)

setTimeout(()=>{heart.remove()},6000)

}

setInterval(createHeart,300)

</script>

</body>

</html>
